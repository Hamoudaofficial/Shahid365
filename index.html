<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>شاهد 365</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
<style>
/* ═══════════════════════ RESET & VARS ═══════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040411;--bg1:#07071C;--bg2:#0C0C24;
  --glass:rgba(255,255,255,.045);--gb:rgba(255,255,255,.08);--gb2:rgba(255,255,255,.13);
  --a:#4F8FFF;--a2:#2D6FFF;--r:#FF5F6D;--go:#FFD166;--gr:#4ADE80;
  --t1:#fff;--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.32);
  --f:'Cairo',sans-serif;--fo:'Oswald',sans-serif;
  --nav-h:64px;--sb:240px;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--bg);color:var(--t1);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(79,143,255,.35);border-radius:4px}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}
button{font-family:var(--f);cursor:pointer;border:none;background:none}

/* ═══════════════════════ GLASS ═══════════════════════ */
.glass{background:var(--glass);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--gb)}
.glass2{background:rgba(255,255,255,.07);backdrop-filter:blur(32px) saturate(200%);-webkit-backdrop-filter:blur(32px) saturate(200%);border:1px solid var(--gb2)}

/* ═══════════════════════ BUTTONS ═══════════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 24px;border-radius:var(--r12);font-family:var(--f);font-weight:700;font-size:14px;cursor:pointer;border:none;transition:all .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;line-height:1}
.btn-p{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;box-shadow:0 4px 18px rgba(79,143,255,.35)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,143,255,.5)}
.btn-s{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18)}
.btn-s:hover{background:rgba(255,255,255,.18)}
.btn-r{background:linear-gradient(135deg,var(--r),#e03040);color:#fff}
.btn-r:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,95,109,.4)}
.btn-sm{padding:7px 16px;font-size:12px;border-radius:9px}
.btn-lg{padding:14px 32px;font-size:16px;border-radius:14px}
.btn:disabled{opacity:.5;pointer-events:none}

/* ═══════════════════════ BADGES ═══════════════════════ */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-b{background:rgba(79,143,255,.18);color:var(--a);border:1px solid rgba(79,143,255,.3)}
.badge-g{background:rgba(74,222,128,.14);color:var(--gr);border:1px solid rgba(74,222,128,.25)}
.badge-r{background:rgba(255,95,109,.18);color:var(--r);border:1px solid rgba(255,95,109,.3)}
.badge-go{background:rgba(255,209,102,.14);color:var(--go);border:1px solid rgba(255,209,102,.25)}

/* ═══════════════════════ NAV ═══════════════════════ */
#nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 24px;transition:background .3s,backdrop-filter .3s}
#nav.scrolled{background:rgba(4,4,17,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.07)}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.nav-logo-icon{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 16px rgba(79,143,255,.4);flex-shrink:0}
.nav-logo-text{font-family:var(--fo);font-size:20px;font-weight:700;letter-spacing:-.3px}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-link{padding:8px 14px;border-radius:10px;font-size:14px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .18s;white-space:nowrap}
.nav-link:hover,.nav-link.active{color:var(--t1);background:rgba(79,143,255,.12)}
.nav-link.active{color:var(--a)}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-search-wrap{position:relative}
.nav-search{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:8px 16px 8px 38px;color:#fff;font-family:var(--f);font-size:13px;outline:none;width:200px;transition:all .25s}
.nav-search:focus{background:rgba(255,255,255,.1);border-color:rgba(79,143,255,.5);box-shadow:0 0 0 3px rgba(79,143,255,.12);width:240px}
.nav-search::placeholder{color:var(--t3)}
.nav-search-icon{position:absolute;top:50%;transform:translateY(-50%);opacity:.45;font-size:13px;pointer-events:none}
[dir="rtl"] .nav-search-icon{right:13px}
[dir="ltr"] .nav-search-icon{left:13px}
[dir="rtl"] .nav-search{padding:8px 38px 8px 16px}
[dir="ltr"] .nav-search{padding:8px 16px 8px 38px}
.lang-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:9px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s}
.lang-btn:hover{background:rgba(255,255,255,.16)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px}
.hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .25s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;inset:0;top:var(--nav-h);background:rgba(4,4,17,.97);backdrop-filter:blur(20px);z-index:190;padding:20px;flex-direction:column;gap:4px;animation:slideDown .25s}
.mobile-menu.open{display:flex}
.mobile-menu .nav-link{padding:14px 18px;border-radius:12px;font-size:16px}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════ MAIN ═══════════════════════ */
#app{padding-top:var(--nav-h);min-height:100vh}
.view{animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════ HERO ═══════════════════════ */
.hero{position:relative;height:min(90vh,720px);overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;animation:heroZoom 8s ease forwards}
@keyframes heroZoom{from{transform:scale(1.06)}to{transform:scale(1)}}
.hero-veil{position:absolute;inset:0}
.hero-bottom{position:absolute;bottom:0;left:0;right:0;height:240px;background:linear-gradient(to top,var(--bg) 0%,transparent 100%)}
.hero-content{position:absolute;inset:0;display:flex;align-items:center;padding:0 48px}
[dir="rtl"] .hero-content{justify-content:flex-end}
.hero-inner{max-width:600px;animation:fadeUp .7s cubic-bezier(.22,1,.36,1) both}
.hero-badges{display:flex;align-items:center;gap:9px;margin-bottom:16px;flex-wrap:wrap}
.hero-title{font-family:var(--fo);font-size:clamp(36px,6vw,68px);font-weight:700;line-height:1.05;letter-spacing:-1px;text-shadow:0 4px 32px rgba(0,0,0,.6);margin-bottom:14px}
.hero-desc{font-size:15px;color:var(--t2);line-height:1.8;margin-bottom:22px;max-width:480px}
.hero-genres{display:flex;gap:8px;margin-bottom:26px;flex-wrap:wrap}
.hero-genre{padding:4px 14px;border-radius:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);font-size:12px;font-weight:600}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.hero-dots{position:absolute;bottom:100px;display:flex;gap:8px;align-items:center}
[dir="rtl"] .hero-dots{left:48px}
[dir="ltr"] .hero-dots{right:48px}
.hero-dot{height:6px;border-radius:999px;background:rgba(255,255,255,.3);cursor:pointer;transition:all .35s cubic-bezier(.34,1.56,.64,1)}
.hero-dot.active{width:28px;background:var(--a)}
.hero-dot:not(.active){width:6px}

/* ═══════════════════════ SECTIONS ═══════════════════════ */
.sections{padding:0 24px 60px;max-width:1440px;margin:0 auto}
.section{margin-bottom:44px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sec-title{font-size:20px;font-weight:800;display:flex;align-items:center;gap:10px}
.sec-bar{width:4px;height:22px;background:linear-gradient(180deg,var(--a),var(--a2));border-radius:999px;flex-shrink:0}
.sec-more{font-size:13px;color:var(--a);cursor:pointer;font-weight:600;display:flex;align-items:center;gap:4px}
.sec-more:hover{color:var(--t1)}

/* ═══════════════════════ CONTENT ROW ═══════════════════════ */
.content-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.content-row::-webkit-scrollbar{display:none}

/* ═══════════════════════ CARD ═══════════════════════ */
.card{min-width:155px;width:155px;flex-shrink:0;border-radius:var(--r16);overflow:hidden;cursor:pointer;position:relative;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
.card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 28px 56px rgba(0,0,0,.7),0 0 0 1px rgba(79,143,255,.22)}
.card-img{width:100%;height:232px;object-fit:cover;display:block}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(4,4,17,.97) 0%,rgba(4,4,17,.35) 55%,transparent 100%)}
.card-hover-tint{position:absolute;inset:0;background:rgba(79,143,255,.07);opacity:0;transition:opacity .2s}
.card:hover .card-hover-tint{opacity:1}
.card-badge{position:absolute;top:9px}
[dir="rtl"] .card-badge{left:9px}
[dir="ltr"] .card-badge{right:9px}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:12px}
.card-title{font-weight:700;font-size:12.5px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{display:flex;align-items:center;gap:5px;font-size:11.5px}
.card-rating{color:var(--go);font-weight:700}
.card-play{margin-top:8px;width:100%;justify-content:center;padding:7px;font-size:11.5px;opacity:0;transform:translateY(4px);transition:all .18s}
.card:hover .card-play{opacity:1;transform:translateY(0)}

/* ═══════════════════════ GRID ═══════════════════════ */
.content-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:18px}

/* ═══════════════════════ LIVE BANNER ═══════════════════════ */
.live-banner{border-radius:var(--r24);padding:24px 32px;margin-bottom:44px;background:linear-gradient(135deg,rgba(79,143,255,.07),rgba(255,95,109,.05));display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--r);animation:pulseDot 1.8s infinite;flex-shrink:0}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}

/* ═══════════════════════ TODAY EPISODES ═══════════════════════ */
.episodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.ep-card{border-radius:var(--r16);padding:14px;display:flex;gap:12px;cursor:pointer;transition:background .2s}
.ep-card:hover{background:rgba(255,255,255,.07)}
.ep-thumb{width:58px;height:84px;border-radius:9px;object-fit:cover;flex-shrink:0}

/* ═══════════════════════ BROWSE / FILTERS ═══════════════════════ */
.browse-header{padding:32px 24px 0;max-width:1440px;margin:0 auto}
.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.filter-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--t2);border-radius:22px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;font-family:var(--f)}
.filter-btn:hover{background:rgba(255,255,255,.13);color:var(--t1)}
.filter-btn.active{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;border-color:transparent}
.filter-select{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--t2);border-radius:22px;padding:8px 18px;font-size:13px;font-family:var(--f);outline:none;cursor:pointer}
.filter-select option{background:#07071C;color:#fff}
.result-count{color:var(--t3);font-size:13px;margin-inline-start:auto}

/* ═══════════════════════ DETAIL ═══════════════════════ */
.detail-backdrop{position:relative;height:min(70vh,580px);overflow:hidden;margin-bottom:0}
.detail-bg{position:absolute;inset:0;background-size:cover;background-position:center top;filter:brightness(.3) saturate(1.2);animation:heroZoom 8s ease forwards}
.detail-veil-side{position:absolute;inset:0}
.detail-veil-bottom{position:absolute;bottom:0;left:0;right:0;height:300px;background:linear-gradient(to top,var(--bg) 0%,transparent 100%)}
.detail-content{position:absolute;inset:0;display:flex;align-items:flex-end;padding:36px 40px}
.detail-inner{display:flex;gap:28px;align-items:flex-end;max-width:900px;width:100%}
.detail-poster{width:140px;height:210px;border-radius:var(--r16);object-fit:cover;flex-shrink:0;box-shadow:0 16px 48px rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.12)}
.detail-info{flex:1}
.detail-title{font-family:var(--fo);font-size:clamp(28px,4vw,52px);font-weight:700;letter-spacing:-1px;line-height:1.05;margin-bottom:10px}
.detail-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:14px}
.detail-rating{color:var(--go);font-weight:800;font-size:18px;font-family:var(--fo)}
.detail-genres{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.detail-desc{font-size:14px;color:var(--t2);line-height:1.8;max-width:600px;margin-bottom:20px}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap}
.detail-body{padding:0 40px 48px;max-width:1440px;margin:0 auto}

/* ═══════════════════════ CAST ═══════════════════════ */
.cast-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.cast-row::-webkit-scrollbar{display:none}
.cast-card{min-width:90px;width:90px;flex-shrink:0;text-align:center;cursor:pointer;transition:transform .2s}
.cast-card:hover{transform:translateY(-4px)}
.cast-photo{width:72px;height:72px;border-radius:50%;object-fit:cover;margin:0 auto 8px;border:2px solid rgba(255,255,255,.15)}
.cast-name{font-size:11.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2)}
.cast-role{font-size:10.5px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}

/* ═══════════════════════ SEASONS ═══════════════════════ */
.season-block{border-radius:var(--r16);overflow:hidden;margin-bottom:12px;border:1px solid rgba(255,255,255,.07)}
.season-head{padding:14px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.04);transition:background .18s}
.season-head:hover{background:rgba(255,255,255,.08)}
.season-body{display:none}
.season-body.open{display:block}
.ep-row{display:flex;align-items:center;gap:14px;padding:12px 20px;border-top:1px solid rgba(255,255,255,.04);transition:background .15s;cursor:pointer}
.ep-row:hover{background:rgba(255,255,255,.04)}
.ep-num{width:36px;height:36px;border-radius:9px;background:rgba(79,143,255,.1);border:1px solid rgba(79,143,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--a);flex-shrink:0}
.ep-thumb-sm{width:76px;height:44px;border-radius:7px;object-fit:cover;flex-shrink:0}
.ep-coming{background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.2);color:var(--go);padding:2px 9px;border-radius:6px;font-size:11px;font-weight:700}

/* ═══════════════════════ LIVE TV ═══════════════════════ */
.live-header{padding:32px 24px 0;max-width:1440px;margin:0 auto}
.live-player{border-radius:var(--r20);overflow:hidden;margin-bottom:28px;aspect-ratio:16/9;background:#000;position:relative;max-height:480px}
.live-player video,.live-player iframe{width:100%;height:100%;border:none}
.live-player-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.live-categories{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;max-width:1440px;padding:0 24px;margin:0 auto}
.ch-card{border-radius:var(--r16);padding:20px 14px;text-align:center;cursor:pointer;transition:all .28s cubic-bezier(.34,1.56,.64,1);border:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;align-items:center;gap:8px}
.ch-card:hover,.ch-card.active{transform:scale(1.05);border-color:rgba(79,143,255,.4);background:rgba(79,143,255,.08)}
.ch-card.active{border-color:rgba(79,143,255,.5);background:rgba(79,143,255,.12)}
.ch-logo{width:56px;height:56px;border-radius:12px;object-fit:contain;background:rgba(255,255,255,.08);padding:4px}
.ch-icon{font-size:40px;line-height:1}
.ch-name{font-weight:700;font-size:13px}
.ch-cat{font-size:10.5px;color:var(--t3)}

/* ═══════════════════════ PERSON ═══════════════════════ */
.person-header{padding:40px 40px 0;max-width:1440px;margin:0 auto;display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap}
.person-photo{width:140px;height:140px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.15);box-shadow:0 8px 32px rgba(0,0,0,.5);flex-shrink:0}
.person-info{flex:1}
.person-name{font-family:var(--fo);font-size:36px;font-weight:700;margin-bottom:8px}
.person-bio{color:var(--t2);font-size:14px;line-height:1.8;max-width:600px}

/* ═══════════════════════ SUBSCRIPTION GATE ═══════════════════════ */
.sub-gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.sub-card{border-radius:var(--r24);padding:44px 38px;width:100%;max-width:440px;position:relative;animation:slideUp .45s cubic-bezier(.22,1,.36,1) both}
@keyframes slideUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ═══════════════════════ MAINTENANCE ═══════════════════════ */
.maintenance{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;position:relative;overflow:hidden}
.maintenance-inner{position:relative;z-index:1;animation:fadeUp .7s cubic-bezier(.22,1,.36,1) both}

/* ═══════════════════════ MODAL ═══════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);z-index:600;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--bg1);border:1px solid rgba(255,255,255,.1);border-radius:var(--r24);padding:32px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.22,1,.36,1)}
.modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .18s}
.modal-close:hover{background:rgba(255,255,255,.2)}

/* ═══════════════════════ PLAYER MODAL ═══════════════════════ */
.player-modal{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:700;display:none;flex-direction:column;align-items:center;justify-content:center}
.player-modal.open{display:flex}
.player-wrap{width:100%;max-width:1100px;position:relative;border-radius:var(--r20);overflow:hidden;aspect-ratio:16/9}
.player-wrap video,.player-wrap iframe{width:100%;height:100%;border:none}
.player-close{position:fixed;top:20px;right:20px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:701}

/* ═══════════════════════ AD BANNER ═══════════════════════ */
.ad-banner{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:500;max-width:880px;width:calc(100% - 32px);border-radius:var(--r12);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.55);animation:adSlideUp .4s both}
@keyframes adSlideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ad-close{position:absolute;top:7px;right:7px;width:26px;height:26px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;z-index:1;font-family:var(--f)}
.ad-progress{position:absolute;bottom:0;left:0;height:3px;background:var(--a);border-radius:2px}
.ad-img{width:100%;max-height:90px;object-fit:cover;cursor:pointer}

/* ═══════════════════════ INPUT ═══════════════════════ */
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:var(--r12);padding:12px 16px;color:#fff;font-family:var(--f);font-size:14px;outline:none;transition:all .2s}
.inp:focus{border-color:rgba(79,143,255,.5);background:rgba(255,255,255,.09);box-shadow:0 0 0 3px rgba(79,143,255,.12)}
.inp::placeholder{color:var(--t3)}

/* ═══════════════════════ TOAST ═══════════════════════ */
#toast-container{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:900;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:rgba(30,30,60,.95);border:1px solid rgba(255,255,255,.12);color:#fff;padding:12px 22px;border-radius:22px;font-size:14px;backdrop-filter:blur(20px);animation:toastIn .3s both;max-width:350px;text-align:center}
.toast.success{border-color:rgba(74,222,128,.35);background:rgba(10,40,20,.9)}
.toast.error{border-color:rgba(255,95,109,.35);background:rgba(40,10,15,.9)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(10px)}}

/* ═══════════════════════ LOADING ═══════════════════════ */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--t3);font-size:15px;gap:10px}
.spinner{width:22px;height:22px;border:2px solid rgba(79,143,255,.2);border-top-color:var(--a);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 100%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-icon{font-size:48px;margin-bottom:16px}

/* ═══════════════════════ AMBIENT ORBS ═══════════════════════ */
.orb{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0}
.orb1{width:700px;height:700px;background:#1A3A8F;top:-250px;right:-200px;opacity:.22;animation:orbFloat 16s ease-in-out infinite}
.orb2{width:600px;height:600px;background:#8B1A2F;bottom:-200px;left:-150px;opacity:.17;animation:orbFloat2 20s ease-in-out infinite}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-30px)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,20px)}}

/* ═══════════════════════ RESPONSIVE ═══════════════════════ */
@media(max-width:900px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .nav-search{width:160px}.nav-search:focus{width:180px}
  .hero-content{padding:0 24px}
  .hero-title{font-size:32px}
  .sections{padding:0 16px 48px}
  .detail-content{padding:24px 20px}
  .detail-inner{flex-direction:column;gap:16px;align-items:flex-start}
  .detail-poster{width:100px;height:150px}
  .detail-body{padding:0 20px 40px}
  .person-header{padding:24px 20px 0}
  .live-header{padding:24px 16px 0}
  .channels-grid{padding:0 16px;grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}
@media(max-width:600px){
  :root{--nav-h:58px}
  .hero{height:min(85vh,560px)}
  .hero-content{padding:0 16px}
  .hero-title{font-size:26px}
  .hero-desc{display:none}
  .hero-dots{bottom:80px}
  .btn-lg{padding:12px 24px;font-size:14px}
  .card{min-width:140px;width:140px}
  .card-img{height:210px}
  .detail-poster{width:80px;height:120px}
  .content-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .filters{gap:7px}
  .filter-btn{padding:7px 14px;font-size:12px}
  .episodes-grid{grid-template-columns:1fr}
  .section{margin-bottom:32px}
  .live-banner{padding:18px 20px}
  .person-photo{width:100px;height:100px}
  .person-name{font-size:26px}
  .sub-card{padding:28px 22px}
}
</style>
</head>
<body>
<!-- ── AMBIENT ORBS ────────────────────────────────────── -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- ── NAVBAR ─────────────────────────────────────────── -->
<nav id="nav">
  <div class="nav-logo" onclick="navigate('home')">
    <div class="nav-logo-icon">▶</div>

    </div>

</nav>

<!-- ── MOBILE MENU ─────────────────────────────────────── -->
<div class="mobile-menu" id="mobile-menu">

  <div class="nav-link" onclick="navigate('movies');closeMobileMenu()">🎬 <span id="mnl-movies">أفلام</span></div>
  <div class="nav-link" onclick="navigate('series');closeMobileMenu()">📺 <span id="mnl-series">مسلسلات</span></div>
  <div class="nav-link" onclick="navigate('live');closeMobileMenu()">📡 <span id="mnl-live">بث مباشر</span></div>

<!-- ── MAIN ────────────────────────────────────────────── -->
<div id="app"></div>

<!-- ── PLAYER MODAL ───────────────────────────────────── -->

    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────────────────── -->
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
//  CONFIG — Update API_BASE after deploying to Render.com
// ═══════════════════════════════════════════════════════════════════════════════
const CONFIG = {
  API_BASE: 'https://shahid365-api.onrender.com', // ← UPDATE THIS
};

// ═══════════════════════════════════════════════════════════════════════════════
//  I18N
// ═══════════════════════════════════════════════════════════════════════════════
const TR = {
  ar: {
    home:'الرئيسية', movies:'أفلام', series:'مسلسلات', live:'بث مباشر',
    trending:'الأكثر مشاهدة', latest:'أحدث الإضافات', todayEps:'حلقات اليوم',
    liveChannels:'قنوات مباشرة', watchLive:'مشاهدة البث',
    watch:'شاهد الآن', download:'تحميل', trailer:'الإعلان', addList:'قائمتي',
    movie:'فيلم', seriesWord:'مسلسل', channel:'قناة', channels:'قنوات',
    all:'الكل', genre:'التصنيف', year:'السنة', rating:'التقييم', lang:'اللغة',
    cast:'طاقم التمثيل', director:'المخرج', seasons:'المواسم',
    season:'الموسم', episode:'الحلقة', comingSoon:'قريباً',
    search:'ابحث...', results:'نتائج', noResults:'لا توجد نتائج',
    subRequired:'اشتراك مطلوب', subDesc:'أدخل كود الاشتراك للوصول إلى المحتوى.',
    subCode:'كود الاشتراك', activate:'تفعيل', verifying:'جارٍ التحقق...',
    subSuccess:'تم تفعيل الاشتراك على هذا الجهاز ✓',
    maintenance:'تحت الصيانة', mainBack:'العودة',
    works:'أعماله',
    available:'متاح', offline:'متوقف', loading:'جارٍ التحميل...',
    moreContent:'المزيد', back:'رجوع',
    filmInfo:'معلومات الفيلم', relatedContent:'محتوى مشابه',
    viewAll:'عرض الكل',
  },
  en: {
    home:'Home', movies:'Movies', series:'Series', live:'Live TV',
    trending:'Trending Now', latest:'Latest Additions', todayEps:"Today's Episodes",
    liveChannels:'Live Channels', watchLive:'Watch Live',
    watch:'Watch Now', download:'Download', trailer:'Trailer', addList:'My List',
    movie:'Movie', seriesWord:'Series', channel:'Channel', channels:'Channels',
    all:'All', genre:'Genre', year:'Year', rating:'Rating', lang:'Language',
    cast:'Cast', director:'Director', seasons:'Seasons',
    season:'Season', episode:'Episode', comingSoon:'Coming Soon',
    search:'Search...', results:'results', noResults:'No results found',
    subRequired:'Subscription Required', subDesc:'Enter your subscription code to access content.',
    subCode:'Subscription Code', activate:'Activate', verifying:'Verifying...',
    subSuccess:'Subscription activated on this device ✓',
    maintenance:'Under Maintenance', mainBack:'Go Back',
    works:'Works',
    available:'Available', offline:'Offline', loading:'Loading...',
    moreContent:'More', back:'Back',
    filmInfo:'Film Info', relatedContent:'Related Content',
    viewAll:'View All',
  },
};

let lang = localStorage.getItem('s365_lang') || 'ar';
const t  = k => TR[lang][k] || k;

function setLang(l) {
  lang = l;
  localStorage.setItem('s365_lang', l);
  document.documentElement.lang = l;
  document.documentElement.dir  = l === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('lang-btn').textContent = l === 'ar' ? 'EN' : 'عربي';
  updateNavLabels();
  App.rerender();
}
function toggleLang() { setLang(lang === 'ar' ? 'en' : 'ar'); }
function updateNavLabels() {
  const ids = ['home','movies','series'];
  ids.forEach(k => {
    const el = document.getElementById('nl-'+k);
    const mel = document.getElementById('mnl-'+k);
    if (el) el.textContent = t(k);
    if (mel) mel.textContent = t(k);
  });
  const nlLive = document.getElementById('nl-live-text');
  const mnlLive = document.getElementById('mnl-live');
  if (nlLive) nlLive.textContent = t('live');
  if (mnlLive) mnlLive.textContent = t('live');
}

// ═══════════════════════════════════════════════════════════════════════════════
//  API CLIENT
// ═══════════════════════════════════════════════════════════════════════════════
const API = {
  base: CONFIG.API_BASE,
  async req(method, ep, data) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (data) opts.body = JSON.stringify(data);
    const res = await fetch(this.base + ep, opts);
    const json = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(json.error || 'API error');
    return json;
  },
  get:  (ep) => API.req('GET', ep),
  post: (ep, d) => API.req('POST', ep, d),
};

// ═══════════════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════════════
const State = {
  page:       'home',
  params:     {},
  settings:   null,
  subVerified: !!localStorage.getItem('s365_sub'),
  fp:          null,
  pageViewCount: 0,
  adShown:    false,
  activeAds:  [],
};

// ═══════════════════════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════════
function navigate(page, params = {}) {
  State.page   = page;
  State.params = params;
  State.pageViewCount++;
  window.scrollTo(0, 0);
  document.querySelectorAll('.nav-link[data-page]').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  App.render();
  maybeShowAd();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════════════════════════════════════════
const App = {
  async init() {
    // Set lang
    document.documentElement.lang = lang;
    document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
    document.getElementById('lang-btn').textContent = lang === 'ar' ? 'EN' : 'عربي';
    updateNavLabels();

    // Fingerprint
    try {
      const fp = await FingerprintJS.load();
      const res = await fp.get();
      State.fp = res.visitorId;
    } catch { State.fp = 'fp-' + Math.random().toString(36).slice(2); }

    // Load settings
    try {
      State.settings = await API.get('/api/settings');
      const titleEl = document.getElementById('site-title');
      if (titleEl) titleEl.innerHTML = (lang==='ar'?State.settings.siteTitleAr||'شاهد':'Shahid365').replace('365','<span style="color:var(--a)">365</span>');
    } catch { /* use defaults */ }

    // Nav scroll effect
    window.addEventListener('scroll', () => {
      document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 40);
    });

    // Search
    const searchEl = document.getElementById('nav-search');
    let searchTimer;
    searchEl.placeholder = t('search');
    searchEl.addEventListener('input', e => {
      clearTimeout(searchTimer);
      const q = e.target.value.trim();
      if (!q) { if (State.page === 'search') navigate('home'); return; }
      searchTimer = setTimeout(() => navigate('search', { q }), 350);
    });

    // Load ads
    try { State.activeAds = await API.get('/api/ads?position=home'); } catch {}

    this.render();
  },

  render() {
    // Maintenance check
    if (State.settings?.maintenance?.on) { renderMaintenance(); return; }
    // Subscription gate check
    if (State.settings?.subRequired && !State.subVerified && State.page !== 'home') {
      renderSubGate(); return;
    }
    switch (State.page) {
      case 'home':    renderHome();    break;
      case 'movies':  renderBrowse({ type: 'movie' });  break;
      case 'series':  renderBrowse({ type: 'series' }); break;
      case 'live':    renderLive();    break;
      case 'browse':  renderBrowse(State.params); break;
      case 'detail':  renderDetail(State.params.id, State.params.type); break;
      case 'person':  renderPerson(State.params.id); break;
      case 'search':  renderSearch(State.params.q);  break;
      default:        renderHome();
    }
  },

  rerender() { this.render(); },
};

// ═══════════════════════════════════════════════════════════════════════════════
//  RENDER HOME
// ═══════════════════════════════════════════════════════════════════════════════
async function renderHome() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  try {
    const [featuredRes, moviesRes, seriesRes, channelsRes, epsRes] = await Promise.all([
      API.get('/api/movies?featured=true&limit=5'),
      API.get('/api/movies?type=movie&sort=-rating&limit=16'),
      API.get('/api/movies?type=series&sort=-rating&limit=16'),
      API.get('/api/channels?active=true'),
      API.get('/api/episodes/today'),
    ]);
    const featured = featuredRes.items || [];
    const movies   = moviesRes.items  || [];
    const series   = seriesRes.items  || [];
    const channels = channelsRes || [];
    const todayEps = epsRes || [];

    app.innerHTML = `<div class="view">
      ${featured.length ? renderHeroSlider(featured) : ''}
      <div class="sections">
        ${movies.length  ? renderRow(t('trending'), movies, 'movie') : ''}
        ${series.length  ? renderRow(t('series')+'', series, 'series') : ''}
        ${channels.length? renderLiveBanner(channels) : ''}
        ${todayEps.length? renderTodayEps(todayEps) : ''}
        ${movies.length  ? renderRow(t('latest'), [...movies].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,16), 'movie') : ''}
      </div>
    </div>`;
    initHeroSlider();
  } catch (e) {
    app.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div>${e.message}</div></div>`;
  }
}

// ── Hero Slider ───────────────────────────────────────────────────────────────
function renderHeroSlider(items) {
  return `
  <div class="hero" id="hero">
    ${items.map((m, i) => {
      const title = lang==='ar' ? (m.titleAr||m.title) : (m.title||m.titleAr);
      const desc  = lang==='ar' ? (m.descAr||m.desc||'') : (m.desc||m.descAr||'');
      const genres = lang==='ar' ? (m.genresAr||m.genres||[]) : (m.genres||[]);
      return `
      <div class="hero-slide" data-idx="${i}" style="position:absolute;inset:0;opacity:${i===0?1:0};transition:opacity .8s;z-index:${i===0?2:1}">
        <div class="hero-bg" style="background-image:url('${m.backdrop||m.poster}')"></div>
        <div class="hero-veil" style="background:${lang==='ar'
          ?'linear-gradient(to left,rgba(4,4,17,.97) 0%,rgba(4,4,17,.52) 52%,rgba(4,4,17,.15) 100%)'
          :'linear-gradient(to right,rgba(4,4,17,.97) 0%,rgba(4,4,17,.52) 52%,rgba(4,4,17,.15) 100%)'}"></div>
        <div class="hero-bottom"></div>
        <div class="hero-content">
          <div class="hero-inner">
            <div class="hero-badges">
              <span class="badge ${m.type==='movie'?'badge-b':'badge-go'}">${m.type==='movie'?t('movie'):t('seriesWord')}</span>
              ${m.type==='series'?`<span class="badge badge-r">🔴 ${t('todayEps')}</span>`:''}
              <span style="color:var(--go);font-weight:800;font-size:14px">★ ${m.rating||'—'}</span>
              <span style="color:var(--t3);font-size:13px">• ${m.year||''}</span>
            </div>
            <h1 class="hero-title">${title}</h1>
            ${desc?`<p class="hero-desc">${desc.slice(0,180)}${desc.length>180?'…':''}</p>`:''}
            <div class="hero-genres">${genres.slice(0,4).map(g=>`<span class="hero-genre">${g}</span>`).join('')}</div>
            <div class="hero-actions">
              <button class="btn btn-p btn-lg" onclick="navigate('detail',{id:'${m._id}',type:'${m.type}'})">▶ ${t('watch')}</button>
              ${m.trailerUrl?`<button class="btn btn-s btn-lg" onclick="openPlayer('${m.trailerUrl}')">🎬 ${t('trailer')}</button>`:''}
              <button class="btn btn-s btn-lg">♡ ${t('addList')}</button>
            </div>
          </div>
        </div>
      </div>`;
    }).join('')}
    <div class="hero-dots" id="hero-dots">
      ${items.map((_,i)=>`<div class="hero-dot ${i===0?'active':''}" data-dot="${i}" onclick="goHeroSlide(${i})"></div>`).join('')}
    </div>
  </div>`;
}

let heroTimer, heroIdx = 0;
function initHeroSlider() {
  const slides = document.querySelectorAll('.hero-slide');
  if (!slides.length) return;
  clearInterval(heroTimer);
  heroTimer = setInterval(() => goHeroSlide((heroIdx + 1) % slides.length), 6000);
}
function goHeroSlide(idx) {
  const slides = document.querySelectorAll('.hero-slide');
  const dots   = document.querySelectorAll('.hero-dot');
  slides.forEach((s,i) => { s.style.opacity = i===idx?1:0; s.style.zIndex = i===idx?2:1; });
  dots.forEach((d,i) => d.classList.toggle('active', i===idx));
  heroIdx = idx;
}

// ── Sections ──────────────────────────────────────────────────────────────────
function renderRow(title, items, type) {
  if (!items.length) return '';
  return `
  <div class="section">
    <div class="sec-head">
      <div class="sec-title"><div class="sec-bar"></div>${title}</div>
      <div class="sec-more" onclick="navigate('browse',{type})" style="--type:'${type}'">${t('viewAll')} →</div>
    </div>
    <div class="content-row">${items.map((m,i) => cardHTML(m, i*0.05)).join('')}</div>
  </div>`;
}

function renderLiveBanner(channels) {
  return `
  <div class="live-banner glass">
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="live-dot"></span>
        <span style="color:var(--r);font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase">LIVE</span>
      </div>
      <h3 style="font-family:var(--fo);font-size:22px;font-weight:700;margin-bottom:4px">${t('liveChannels')}</h3>
      <span style="color:var(--t3);font-size:13px">${channels.filter(c=>c.active).length} ${t('channels')}</span>
    </div>
    <div style="display:flex;gap:9px;flex-wrap:wrap">
      ${channels.slice(0,5).map(c=>`

async function renderBrowse(params = {}) {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  try {
    const genresSet = new Set();
    let qs = '?limit=48';
    if (params.type)  qs += `&type=${params.type}`;
    if (params.q)     qs += `&q=${encodeURIComponent(params.q)}`;
    if (params.genre) qs += `&genre=${encodeURIComponent(params.genre)}`;
    if (params.year)  qs += `&year=${params.year}`;
    if (params.sort)  qs += `&sort=${params.sort}`;

    const data = await API.get(`/api/movies${qs}`);
    const items = data.items || [];
    items.forEach(m => (m.genres||[]).forEach(g => genresSet.add(g)));

    const pageTitle = params.type==='movie'?t('movies'):params.type==='series'?t('series'):(params.q?`"${params.q}"`:t('movies')+' & '+t('series'));

    app.innerHTML = `<div class="view">
      <div class="browse-header">
        <h2 style="font-family:var(--fo);font-size:28px;font-weight:700;margin-bottom:20px">${pageTitle}</h2>
        <div class="filters" id="filters">
          <button class="filter-btn ${!params.type?'active':''}" onclick="applyFilter({type:''})">  ${t('all')}</button>
          <button class="filter-btn ${params.type==='movie'?'active':''}" onclick="applyFilter({type:'movie'})">🎬 ${t('movie')}</button>
          <button class="filter-btn ${params.type==='series'?'active':''}" onclick="applyFilter({type:'series'})">📺 ${t('seriesWord')}</button>
          <select class="filter-select" onchange="applyFilter({sort:this.value})" style="margin-inline-start:8px">
            <option value="-rating">${t('rating')}</option>
            <option value="-createdAt">${t('latest')}</option>
            <option value="-year">${t('year')}</option>
            <option value="-views">${t('trending')}</option>
          </select>
          <span class="result-count">${data.total} ${t('results')}</span>
        </div>
      </div>
      <div style="padding:0 24px 60px;max-width:1440px;margin:0 auto">
        ${items.length
          ? `<div class="content-grid">${items.map((m,i)=>cardHTML(m,i*.03)).join('')}</div>`
          : `<div class="empty"><div class="empty-icon">🎬</div><div>${t('noResults')}</div></div>`}
      </div>
    </div>`;
  } catch (e) {
    app.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div>${e.message}</div></div>`;
  }
}

function applyFilter(delta) {
  navigate('browse', { ...State.params, ...delta });
}

function scrollToSeasons() {
  const el = document.getElementById('seasons-section');
  if (el) el.scrollIntoView({ behavior: 'smooth' });
}

async function renderSeasonsHTML(seasons, movieId) {
  if (!seasons.length) return '';
  let html = '';
  for (const s of seasons) {
    let episodes = [];
    try { episodes = await API.get(`/api/seasons/${s._id}/episodes`); } catch {}
    const sTitle = lang==='ar'?(s.titleAr||s.title):(s.title||s.titleAr)||`${t('season')} ${s.n}`;
    html += `
    <div class="season-block">
      <div class="season-head" onclick="toggleSeason('${s._id}')">
        <span style="font-weight:700">${sTitle}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:12px;color:var(--t3)">${s.epCount||episodes.length} ${t('episode')}</span>
          <span id="arr-${s._id}" style="font-size:14px;transition:transform .25s">▼</span>
        </div>
      </div>
      <div class="season-body" id="sbody-${s._id}">
        ${episodes.map(ep => {
          const epTitle  = lang==='ar'?(ep.titleAr||ep.title):(ep.title||ep.titleAr)||`${t('episode')} ${ep.n}`;
          const isFuture = ep.releaseDate && new Date(ep.releaseDate) > new Date();
          return `
          <div class="ep-row ${isFuture?'':'pointer'}" onclick="${!isFuture&&ep.videoUrl?`openPlayer('${ep.videoUrl}')`:''}" style="${isFuture?'opacity:.6':''}">
            <div class="ep-num">${ep.n}</div>
            ${ep.thumb?`<img class="ep-thumb-sm" src="${ep.thumb}" loading="lazy" alt="" onerror="this.remove()">`:''}
            <div style="flex:1;overflow:hidden">
              <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${epTitle}</div>
              ${ep.duration?`<div style="font-size:12px;color:var(--t3)">${ep.duration} min</div>`:''}
            </div>
            ${isFuture?`<span class="ep-coming">${t('comingSoon')}</span>`:''}
            ${!isFuture&&ep.videoUrl?`<button class="btn btn-p btn-sm">▶</button>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  return html;
}

function toggleSeason(id) {
  const body = document.getElementById(`sbody-${id}`);
  const arr  = document.getElementById(`arr-${id}`);
  if (!body) return;
  const open = body.classList.toggle('open');
  if (arr) arr.style.transform = open ? 'rotate(180deg)' : '';
}

    <div style="height:40px"></div>

      <div style="margin-bottom:14px">
        <label style="display:block;font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px">${t('subCode')}</label>
        <input class="inp" id="sub-code-inp" placeholder="SHAH-XXXX-YYYY" style="text-align:center;font-family:monospace;font-size:16px;letter-spacing:2px" oninput="this.value=this.value.toUpperCase()"/>
      </div>
      <div id="sub-error" style="display:none;background:rgba(255,95,109,.1);border:1px solid rgba(255,95,109,.28);border-radius:10px;padding:10px;color:var(--r);font-size:13px;text-align:center;margin-bottom:12px"></div>
      <button class="btn btn-p" style="width:100%;padding:13px;font-size:15px" id="sub-btn" onclick="verifySubscription()">${t('activate')}</button>
      <button class="btn btn-s" style="width:100%;margin-top:10px;padding:11px;font-size:13px" onclick="navigate('home')">← ${t('home')}</button>
    </div>
  </div>`;
}

async function verifySubscription() {
  const code = document.getElementById('sub-code-inp')?.value?.trim();
  const btn  = document.getElementById('sub-btn');
  const err  = document.getElementById('sub-error');
  if (!code) return;
  btn.disabled = true;
  btn.textContent = t('verifying');
  err.style.display = 'none';
  try {
    await API.post('/api/subscriptions/verify', { code, fp: State.fp || 'fp-unknown', ua: navigator.userAgent });
    localStorage.setItem('s365_sub', code);
    State.subVerified = true;
    showToast(t('subSuccess'), 'success');
    navigate('home');
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = t('activate');
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  MAINTENANCE

  document.getElementById('app').innerHTML = `
  <div class="maintenance">
    <div class="orb" style="width:600px;height:600px;background:#1A3A8F;top:-200px;right:-150px;opacity:.2"></div>
    <div class="orb" style="width:500px;height:500px;background:#8B1A2F;bottom:-150px;left:-100px;opacity:.17"></div>
    <div class="maintenance-inner">
      <div style="font-size:80px;margin-bottom:22px">🔧</div>
      <div class="badge badge-r" style="margin-bottom:18px;padding:5px 16px;font-size:11px;letter-spacing:2px;text-transform:uppercase">Maintenance</div>
      <h1 style="font-family:var(--fo);font-size:clamp(28px,6vw,52px);font-weight:700;letter-spacing:-1px;margin-bottom:14px">${t('maintenance')}</h1>
      ${msg?`<p style="font-size:15px;color:var(--t2);max-width:380px;line-height:1.75;margin:0 auto">${msg}</p>`:''}

// ═══════════════════════════════════════════════════════════════════════════════
//  PLAYER
// ═══════════════════════════════════════════════════════════════════════════════
function openPlayer(url) {
  if (!url) return;
  const modal = document.getElementById('player-modal');
  const wrap  = document.getElementById('player-wrap');
  if (url.includes('youtube.com') || url.includes('youtu.be')) {
    const vid = url.includes('watch?v=') ? url.split('watch?v=')[1].split('&')[0] : url.split('/').pop();
    wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1&rel=0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
  } else {
    wrap.innerHTML = `<video src="${url}" controls autoplay style="background:#000"></video>`;
  }
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePlayer() {
  document.getElementById('player-modal').classList.remove('open');
  document.getElementById('player-wrap').innerHTML = '';
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════════════════════════════
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

// ═══════════════════════════════════════════════════════════════════════════════
//  ADS
// ═══════════════════════════════════════════════════════════════════════════════
function maybeShowAd() {
  const ads = State.activeAds.filter(a => a.adType === 'banner');
  if (!ads.length) return;
  const ad = ads[Math.floor(Math.random()*ads.length)];
  if (State.pageViewCount % (ad.everyN||4) !== 0) return;
  const existing = document.getElementById('ad-banner');
  if (existing) existing.remove();
  setTimeout(() => showAdBanner(ad), ad.delayMs || 3000);
}

function showAdBanner(ad) {
  const dur  = (ad.bannerSecs || 8) * 1000;
  const el   = document.createElement('div');
  el.id      = 'ad-banner';
  el.className = 'ad-banner glass';
  el.innerHTML = `
    <div class="ad-close" id="ad-close-btn">✕</div>
    <a href="${ad.linkUrl}" target="_blank" rel="noreferrer" id="ad-link">
      <img class="ad-img" src="${ad.imageUrl}" alt="Ad" onerror="document.getElementById('ad-banner')?.remove()"/>
    </a>
    <div class="ad-progress" id="ad-prog" style="transition:width ${dur}ms linear;width:100%"></div>`;
  document.body.appendChild(el);

  // Track impression
  API.req('PATCH', `/api/ads/${ad._id}/track`, { event: 'impression' }).catch(()=>{});
  document.getElementById('ad-link')?.addEventListener('click', () => {
    API.req('PATCH', `/api/ads/${ad._id}/track`, { event: 'click' }).catch(()=>{});
  });
  document.getElementById('ad-close-btn').addEventListener('click', () => el.remove());

  // Animate progress bar
  requestAnimationFrame(() => {
    const prog = document.getElementById('ad-prog');
    if (prog) prog.style.width = '0%';
  });

  setTimeout(() => el.remove(), dur + 400);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  MOBILE MENU
// ═══════════════════════════════════════════════════════════════════════════════
function toggleMobileMenu() {
  const menu = document.getElementById('mobile-menu');
  const ham  = document.getElementById('hamburger');
  const open = menu.classList.toggle('open');
  ham.classList.toggle('open', open);
}
function closeMobileMenu() {
  document.getElementById('mobile-menu').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════════════════════════
function showToast(msg, type = '') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.animation = 'toastOut .3s both'; setTimeout(() => el.remove(), 300); }, 3500);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
