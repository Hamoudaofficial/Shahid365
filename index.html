<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#040411"/>
<title>شاهد 365</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040411;--bg1:#07071C;--bg2:#0d0d20;
  --gl:rgba(255,255,255,.045);--gb:rgba(255,255,255,.08);--gb2:rgba(255,255,255,.13);
  --a:#4F8FFF;--a2:#2D6FFF;--r:#FF5F6D;--go:#FFD166;--gr:#4ADE80;
  --t1:#fff;--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.32);
  --f:'Cairo',sans-serif;--fo:'Oswald',sans-serif;--nav-h:64px;
}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--bg);color:var(--t1);overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(79,143,255,.32);border-radius:4px}
img{display:block;max-width:100%}
button{cursor:pointer;border:none;font-family:var(--f)}
/* GLASS */
.gl{background:var(--gl);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--gb)}
.gl2{background:rgba(255,255,255,.07);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid var(--gb2)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 24px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:none;transition:all .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;line-height:1;font-family:var(--f)}
.bp{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;box-shadow:0 4px 18px rgba(79,143,255,.35)}.bp:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(79,143,255,.5)}
.bs{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18)}.bs:hover{background:rgba(255,255,255,.18)}
.btn-lg{padding:14px 32px;font-size:16px;border-radius:14px}
.btn-sm{padding:7px 15px;font-size:12px;border-radius:9px}
.btn:disabled{opacity:.45;pointer-events:none}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700}
.bb{background:rgba(79,143,255,.18);color:var(--a);border:1px solid rgba(79,143,255,.3)}
.bgo{background:rgba(255,209,102,.14);color:var(--go);border:1px solid rgba(255,209,102,.25)}
.br{background:rgba(255,95,109,.18);color:var(--r);border:1px solid rgba(255,95,109,.3)}
.bg{background:rgba(74,222,128,.14);color:var(--gr);border:1px solid rgba(74,222,128,.25)}
/* NAV */
#nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 24px;transition:all .3s}
#nav.scrolled{background:rgba(4,4,17,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.07)}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.nav-logo-ic{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 16px rgba(79,143,255,.4);flex-shrink:0}
.nav-logo-t{font-family:var(--fo);font-size:20px;font-weight:700;letter-spacing:-.3px}
.nav-links{display:flex;align-items:center;gap:2px}
.nl{padding:8px 14px;border-radius:10px;font-size:14px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .18s;white-space:nowrap}
.nl:hover,.nl.act{color:var(--t1);background:rgba(79,143,255,.12)}
.nl.act{color:var(--a)}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-sr{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:8px 16px 8px 38px;color:#fff;font-family:var(--f);font-size:13px;outline:none;width:190px;transition:all .25s}
.nav-sr:focus{background:rgba(255,255,255,.1);border-color:rgba(79,143,255,.5);box-shadow:0 0 0 3px rgba(79,143,255,.12);width:230px}
.nav-sr::placeholder{color:var(--t3)}
[dir="rtl"] .nav-sr{padding:8px 38px 8px 16px}
.lang-b{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:9px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;font-family:var(--f)}
.lang-b:hover{background:rgba(255,255,255,.16)}
.ham{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none}
.ham span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .25s}
.ham.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.ham.open span:nth-child(2){opacity:0}
.ham.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mob-menu{display:none;position:fixed;inset:0;top:var(--nav-h);background:rgba(4,4,17,.97);backdrop-filter:blur(20px);z-index:190;padding:20px;flex-direction:column;gap:4px;animation:fadeUp .25s}
.mob-menu.open{display:flex}
.mob-menu .nl{padding:14px 18px;border-radius:12px;font-size:16px}
/* APP */
#app{padding-top:var(--nav-h);min-height:100vh}
.view{animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both}
/* HERO */
.hero{position:relative;height:min(92vh,740px);overflow:hidden}
.hero-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;animation:hzoom 8s ease forwards;filter:brightness(.32) saturate(1.3)}
.hero-veil{position:absolute;inset:0}
.hero-bot{position:absolute;bottom:0;left:0;right:0;height:260px;background:linear-gradient(to top,var(--bg) 0%,transparent 100%)}
.hero-cont{position:absolute;inset:0;display:flex;align-items:center;padding:0 52px}
[dir="rtl"] .hero-cont{justify-content:flex-end}
.hero-inner{max-width:620px;animation:fadeUp .7s cubic-bezier(.22,1,.36,1) both}
.hero-title{font-family:var(--fo);font-size:clamp(36px,6vw,70px);font-weight:700;line-height:1.03;letter-spacing:-1.5px;text-shadow:0 4px 32px rgba(0,0,0,.6);margin-bottom:14px}
.hero-desc{font-size:15px;color:var(--t2);line-height:1.85;max-width:480px;margin-bottom:20px}
.hero-genres{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.hero-genre{padding:4px 14px;border-radius:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);font-size:12px;font-weight:600}
.hero-dots{position:absolute;bottom:100px;display:flex;gap:8px;align-items:center}
[dir="rtl"] .hero-dots{left:52px}
[dir="ltr"] .hero-dots{right:52px}
.hero-dot{height:6px;border-radius:999px;background:rgba(255,255,255,.3);cursor:pointer;transition:all .35s cubic-bezier(.34,1.56,.64,1)}
.hero-dot.act{width:28px;background:var(--a)}
.hero-dot:not(.act){width:6px}
/* SECTIONS */
.secs{padding:0 24px 60px;max-width:1440px;margin:0 auto}
.sec{margin-bottom:44px}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sec-title{font-size:20px;font-weight:800;display:flex;align-items:center;gap:10px}
.sec-bar{width:4px;height:22px;border-radius:999px;flex-shrink:0}
.sec-more{font-size:13px;color:var(--a);cursor:pointer;font-weight:600}
.sec-more:hover{color:var(--t1)}
/* ROW */
.row{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.row::-webkit-scrollbar{display:none}
/* CARD */
.card{min-width:155px;width:155px;flex-shrink:0;border-radius:16px;overflow:hidden;cursor:pointer;position:relative;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
.card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 28px 56px rgba(0,0,0,.7),0 0 0 1px rgba(79,143,255,.22)}
.card-img{width:100%;height:232px;object-fit:cover;display:block;background:rgba(255,255,255,.07)}
.card-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(4,4,17,.97) 0%,rgba(4,4,17,.35) 55%,transparent 100%)}
.card-shine{position:absolute;inset:0;background:rgba(79,143,255,.07);opacity:0;transition:opacity .2s}
.card:hover .card-shine{opacity:1}
.card-bdg{position:absolute;top:9px}
[dir="rtl"] .card-bdg{left:9px}
[dir="ltr"] .card-bdg{right:9px}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:12px}
.card-title{font-weight:700;font-size:12.5px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-play{margin-top:8px;width:100%;padding:7px;font-size:11.5px;opacity:0;transform:translateY(4px);transition:all .18s;justify-content:center}
.card:hover .card-play{opacity:1;transform:translateY(0)}
/* TRENDING */
.trend-card{min-width:170px;width:170px;flex-shrink:0;border-radius:16px;overflow:hidden;cursor:pointer;position:relative;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
.trend-card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 28px 56px rgba(0,0,0,.7),0 0 0 1px rgba(255,209,102,.3)}
.trend-num{position:absolute;top:-4px;font-family:var(--fo);font-size:80px;font-weight:900;line-height:1;color:var(--go);opacity:.16;z-index:2;pointer-events:none}
[dir="rtl"] .trend-num{right:-4px}
[dir="ltr"] .trend-num{left:-4px}
/* GRID */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:18px}
/* LIVE BANNER */
.live-ban{border-radius:24px;padding:24px 32px;margin-bottom:44px;background:linear-gradient(135deg,rgba(79,143,255,.07),rgba(255,95,109,.05));display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.ld{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--r);animation:pd 1.8s infinite;flex-shrink:0}
/* EPISODES GRID */
.eps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.ep-card{border-radius:16px;padding:14px;display:flex;gap:12px;cursor:pointer;transition:background .2s}
.ep-card:hover{background:rgba(255,255,255,.07)}
/* BROWSE */
.browse-h{padding:32px 24px 0;max-width:1440px;margin:0 auto}
.filters{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.fb{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--t2);border-radius:22px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;font-family:var(--f)}
.fb:hover{background:rgba(255,255,255,.13);color:var(--t1)}
.fb.act{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;border-color:transparent}
.fsel{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--t2);border-radius:22px;padding:8px 18px;font-size:13px;font-family:var(--f);outline:none;cursor:pointer;-webkit-appearance:none}
.fsel option{background:#07071C;color:#fff}
/* DETAIL */
.det-back{position:relative;height:min(72vh,600px);overflow:hidden}
.det-bg{position:absolute;inset:0;background-size:cover;background-position:center top;filter:brightness(.3) saturate(1.2);animation:hzoom 8s ease forwards}
.det-side{position:absolute;inset:0}
.det-bot{position:absolute;bottom:0;left:0;right:0;height:300px;background:linear-gradient(to top,var(--bg) 0%,transparent 100%)}
.det-cont{position:absolute;inset:0;display:flex;align-items:flex-end;padding:36px 40px}
.det-in{display:flex;gap:28px;align-items:flex-end;max-width:900px;width:100%}
.det-poster{width:140px;height:210px;border-radius:16px;object-fit:cover;flex-shrink:0;box-shadow:0 16px 48px rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.13);background:rgba(255,255,255,.07)}
.det-title{font-family:var(--fo);font-size:clamp(28px,4vw,54px);font-weight:700;letter-spacing:-1px;line-height:1.05;margin-bottom:10px}
.det-body{padding:0 40px 52px;max-width:1440px;margin:0 auto}
/* CAST */
.cast-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.cast-row::-webkit-scrollbar{display:none}
.cast-c{min-width:90px;width:90px;flex-shrink:0;text-align:center;cursor:pointer;transition:transform .2s}
.cast-c:hover{transform:translateY(-4px)}
.cast-photo{width:72px;height:72px;border-radius:50%;object-fit:cover;margin:0 auto 8px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07)}
.cast-name{font-size:11.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2)}
.cast-role{font-size:10.5px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
/* SEASONS */
.s-block{border-radius:16px;overflow:hidden;margin-bottom:12px;border:1px solid rgba(255,255,255,.07)}
.s-head{padding:14px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.04);transition:background .18s}
.s-head:hover{background:rgba(255,255,255,.08)}
.s-body{display:none}
.s-body.open{display:block}
.ep-row{display:flex;align-items:center;gap:14px;padding:12px 20px;border-top:1px solid rgba(255,255,255,.04);transition:background .15s;cursor:pointer}
.ep-row:hover{background:rgba(255,255,255,.04)}
.ep-num{width:36px;height:36px;border-radius:9px;background:rgba(79,143,255,.1);border:1px solid rgba(79,143,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--a);flex-shrink:0}
/* LIVE */
.live-h{padding:32px 24px 0;max-width:1440px;margin:0 auto}
.live-player-wrap{border-radius:20px;overflow:hidden;margin-bottom:28px;background:#000;position:relative;aspect-ratio:16/9;max-height:500px}
.live-player-wrap video,.live-player-wrap iframe{width:100%;height:100%;border:none}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;max-width:1440px;padding:0 24px;margin:0 auto}
.ch-card{border-radius:16px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .28s cubic-bezier(.34,1.56,.64,1);border:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;align-items:center;gap:8px}
.ch-card:hover,.ch-card.act{transform:scale(1.05);border-color:rgba(79,143,255,.4);background:rgba(79,143,255,.08)}
.ch-card.act{border-color:rgba(79,143,255,.5);background:rgba(79,143,255,.12)}
/* PERSON */
.person-h{padding:40px 40px 0;max-width:1440px;margin:0 auto;display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap}
.person-photo{width:140px;height:140px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.15);box-shadow:0 8px 32px rgba(0,0,0,.5);flex-shrink:0;background:rgba(255,255,255,.07)}
/* INPUT */
.inp{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 16px;color:#fff;font-family:var(--f);font-size:14px;outline:none;transition:all .2s}
.inp:focus{border-color:rgba(79,143,255,.5);background:rgba(255,255,255,.09);box-shadow:0 0 0 3px rgba(79,143,255,.12)}
.inp::placeholder{color:var(--t3)}
/* VIDEO PLAYER */
.vp-modal{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:700;display:none;flex-direction:column;align-items:center;justify-content:center;padding:10px}
.vp-modal.open{display:flex}
.vp-outer{width:100%;max-width:1200px;position:relative}
.vp-close-btn{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:701;transition:background .2s}
.vp-close-btn:hover{background:rgba(255,255,255,.22)}
/* Custom Player */
.vp{position:relative;background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;width:100%;max-height:82vh}
.vp video{width:100%;height:100%;display:block;cursor:pointer;outline:none}
.vp-play-flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .15s}
.vp-play-flash.show{opacity:1}
.vp-controls{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.2) 60%,transparent 100%);padding:16px 16px 12px;opacity:0;transition:opacity .25s;pointer-events:none}
.vp:hover .vp-controls,.vp-controls.show{opacity:1;pointer-events:all}
.vp-prog{width:100%;height:5px;background:rgba(255,255,255,.25);border-radius:3px;cursor:pointer;position:relative;margin-bottom:12px;transition:height .15s}
.vp-prog:hover{height:8px}
.vp-prog-fill{height:100%;background:var(--a);border-radius:3px;pointer-events:none;transition:width .1s linear}
.vp-prog-buf{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.2);border-radius:3px;pointer-events:none}
.vp-prog-handle{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:#fff;border-radius:50%;pointer-events:none;box-shadow:0 0 6px rgba(0,0,0,.5);opacity:0;transition:opacity .15s}
.vp-prog:hover .vp-prog-handle{opacity:1}
.vp-row{display:flex;align-items:center;gap:8px}
.vp-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:20px;padding:4px 6px;transition:transform .15s opacity .15s;line-height:1;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.vp-btn:hover{transform:scale(1.18)}
.vp-btn.sm{font-size:15px}
.vp-vol-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.vp-vol{width:72px;height:4px;-webkit-appearance:none;accent-color:var(--a);background:rgba(255,255,255,.3);border-radius:4px;cursor:pointer;outline:none}
.vp-time{font-size:12.5px;color:rgba(255,255,255,.85);white-space:nowrap;font-variant-numeric:tabular-nums;font-family:monospace;flex-shrink:0}
.vp-spacer{flex:1}
.vp-title-bar{font-size:13px;font-weight:600;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;padding:0 8px}
/* Dropdown menus */
.vp-menu-wrap{position:relative;flex-shrink:0}
.vp-menu{position:absolute;bottom:40px;background:rgba(10,10,25,.96);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:6px 0;min-width:170px;font-size:13px;z-index:10;display:none;animation:fadeUp .15s}
.vp-menu.show{display:block}
[dir="rtl"] .vp-menu{left:0}
[dir="ltr"] .vp-menu{right:0}
.vp-menu-title{padding:8px 14px 4px;font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.vp-mi{padding:9px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:background .15s;color:var(--t2)}
.vp-mi:hover{background:rgba(79,143,255,.12);color:#fff}
.vp-mi.active{color:var(--a)}
.vp-menu-sep{height:1px;background:rgba(255,255,255,.07);margin:4px 0}
/* Stats overlay */
.vp-stats{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.75);border-radius:8px;padding:10px 14px;font-size:11px;font-family:monospace;line-height:1.7;color:rgba(255,255,255,.82);display:none;pointer-events:none;z-index:5;max-width:260px}
.vp-stats.show{display:block}
/* Ad overlay inside player */
.vp-ad-overlay{position:absolute;inset:0;background:#000;z-index:20;display:flex;align-items:center;justify-content:center}
.vp-ad-skip-btn{position:absolute;bottom:76px;right:16px;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:var(--f);font-weight:600;display:flex;align-items:center;gap:8px;transition:all .2s;z-index:25}
.vp-ad-skip-btn:hover{background:rgba(255,255,255,.18)}
.vp-ad-counter{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:rgba(255,255,255,.18);border-radius:50%;font-size:12px;font-weight:900}
/* Subtitle overlay */

<script>
// ══════════════════════════════════════════════════════
//  CONFIG & INIT
// ══════════════════════════════════════════════════════
const SB_URL = 'https://ktkltrrvprtnvtyhmvfc.supabase.co';

    low:'Low', medium:'Medium', high:'High', max:'Max Quality',

    screenLock:'Screen Lock', auto:'Auto', viewAll:'View All',
    topRated:'Top Rated', year:'Year', genre:'Genre', lang:'Language',
    ipBanned:'Your IP address is banned — contact support',
    adFreq_once_per_session:'Once per session',
    adFreq_once_per_day:'Once per day', adFreq_every_visit:'Every visit',
  }
};
const t = k => (I[ST.lang] || I.ar)[k] || k;

// ── Helpers ───────────────────────────────────────────
const $  = id => document.getElementById(id);
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'K' : String(n||0);
const s2t = s => { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60); return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`; };

function toast(msg, type='') {
  const c=$('toasts'), d=document.createElement('div');
  d.className='toast '+(type==='success'?'s':type==='error'?'e':'');
  d.textContent=msg; c.appendChild(d);
  setTimeout(()=>{ d.style.opacity='0'; d.style.transition='opacity .3s'; setTimeout(()=>d.remove(),300); },3500);
}

// ── Language ──────────────────────────────────────────
function toggleLang() {
  ST.lang = ST.lang==='ar' ? 'en' : 'ar';
  localStorage.setItem('s365_lang', ST.lang);
  applyLang(); App.render();
}
function applyLang() {
  document.documentElement.lang = ST.lang;
  document.documentElement.dir  = ST.lang==='ar' ? 'rtl' : 'ltr';
  const lb=$('lang-btn'); if(lb) lb.textContent = ST.lang==='ar'?'EN':'عربي';
  const sr=$('nav-sr') || $('nav-q'); if(sr) sr.placeholder = t('search');
  const ic=$('sr-ic');
  if(ic){ ic.style.right = ST.lang==='ar' ? '13px' : ''; ic.style.left = ST.lang==='ltr' ? '13px' : ''; }
  const nsr = document.querySelector('.nav-sr');
  if(nsr){ nsr.style.padding = ST.lang==='ar' ? '8px 38px 8px 16px' : '8px 16px 8px 38px'; }
}

// ── Mobile menu ───────────────────────────────────────
function toggleMob() { const m=$('mob-menu'),h=$('ham'); const o=m.classList.toggle('open'); h.classList.toggle('open',o); }
function closeMob()   { $('mob-menu')?.classList.remove('open'); $('ham')?.classList.remove('open'); }

// ── My list ───────────────────────────────────────────
function toggleList(id, e) {
  e?.stopPropagation();
  const i = ST.myList.indexOf(id);
  if(i>-1) ST.myList.splice(i,1); else ST.myList.push(id);
  localStorage.setItem('s365_list', JSON.stringify(ST.myList));
  toast(ST.myList.includes(id) ? t('addList')+' ✓' : 'تمت الإزالة');
  // refresh heart icon in DOM
  document.querySelectorAll(`[data-listid="${id}"]`).forEach(el => el.textContent = ST.myList.includes(id)?'♥':'♡');
}

// ── Downloads ─────────────────────────────────────────
function saveDl(item) {
  const existing = ST.downloads.findIndex(d=>d.id===item.id);
  if(existing>-1) { toast('مُنزَّل مسبقاً','error'); return; }
  ST.downloads.push({ ...item, dlDate: new Date().toISOString() });
  localStorage.setItem('s365_dl', JSON.stringify(ST.downloads));
  toast(t('dl')+' ✓ — '+esc(item.title),'success');
}

function openDlModal(id, title, qualities) {
  const qs = qualities || ['منخفضة','متوسطة','عالية','أعلى جودة'];
  $('dl-modal-title').textContent = t('dlQual') + ' — ' + esc(title);
  $('dl-quality-list').innerHTML = qs.map(q => `
    <button class="btn bs" style="width:100%;justify-content:flex-start;gap:12px" onclick="saveDl({id:'${id}',title:'${esc(title)}',quality:'${esc(q)}'});closeDlModal()">
      <span style="font-size:18px">${q==='أعلى جودة'||q==='Max Quality'?'🎬':q==='منخفضة'||q==='Low'?'📱':q==='متوسطة'||q==='Medium'?'💻':'🖥️'}</span>
      <span>${esc(q)}</span>
    </button>`).join('');
  $('dl-modal').classList.add('open');
}
function closeDlModal() { $('dl-modal').classList.remove('open'); }

// ══════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════
function go(page, params={}) {
  ST.page=page; ST.params=params; ST.pgCount++;
  window.scrollTo(0,0);
  document.querySelectorAll('.nl[data-pg]').forEach(e=>e.classList.toggle('act',e.dataset.pg===page));
  App.render();
  scheduleAd();
}

function isSub() { return !!localStorage.getItem('s365_sub'); }

// ══════════════════════════════════════════════════════
//  APP CONTROLLER
// ══════════════════════════════════════════════════════
const App = {
  async init() {
    applyLang();
    // Fingerprint
    try { const fp=await FingerprintJS.load(); const r=await fp.get(); ST.fp=r.visitorId; }
    catch { ST.fp='fp-'+Date.now().toString(36)+Math.random().toString(36).slice(2); }
    // Settings
    try { ST.settings = await DB.getSettings(); } catch {}
    // ── SPLASH SCREEN ──
    initSplash();
    // IP ban check
    try {
      const res = await fetch('https://api.ipify.org?format=json', { signal: AbortSignal.timeout(5000) });
      if(res.ok) {
        const { ip } = await res.json();
        const { data } = await sb.from('banned_ips').select('ip_address').eq('ip_address',ip).maybeSingle();
        if(data) ST.banned = true;
      }
    } catch {}
    // Nav scroll
    window.addEventListener('scroll', ()=>$('nav')?.classList.toggle('scrolled', window.scrollY>40));
    // Search
    let st;
    $('nav-q')?.addEventListener('input', e => {
      clearTimeout(st);
      const q = e.target.value.trim();
      if(!q) { if(ST.page==='search') go('home'); return; }
      st = setTimeout(()=>go('search',{q}),360);
    });
    // Ads
    if(ST.settings?.ads_enabled !== false) {
      try { ST.activeAds = await DB.getAds(); } catch {}
      detectAdblock();
    }
    // ── LOGO & SITE TITLE ──
    updateNavBranding();
    this.render();
  },
  render() {
    if(ST.banned) { renderBanned(); return; }
    if(ST.settings?.maintenance_on) { renderMaintenance(); return; }
    if(ST.settings?.sub_required && !isSub() && !['home','sub'].includes(ST.page)) { renderSubGate(); return; }
    const map = {
      home:()=>renderHome(), movies:()=>renderBrowse({type:'movie',...ST.params}),
      series:()=>renderBrowse({type:'series',...ST.params}), browse:()=>renderBrowse(ST.params),
      live:()=>renderLive(), detail:()=>renderDetail(ST.params.id),
      person:()=>renderPerson(ST.params.id), search:()=>renderSearch(ST.params.q),
      sub:()=>renderSubGate(), downloads:()=>renderDownloads(),
    };
    (map[ST.page]||map.home)();

// ══════════════════════════════════════════════════════
//  SPLASH SCREEN
// ══════════════════════════════════════════════════════
function initSplash() {
  const s = ST.settings;
  // Only show once per session
  if(sessionStorage.getItem('s365_splashed')) return;
  if(!s?.splash_enabled || !s?.splash_video_url) return;

  const splashEl  = $('splash');
  const videoEl   = $('splash-video');
  const skipBtn   = $('splash-skip');
  const progEl    = $('splash-progress');
  const logoImg   = $('splash-logo-img');
  const brandEl   = $('splash-brand');
  const dur       = Math.max(1, +(s.splash_duration||5));

  // Show logo on splash
  if(s.logo_url && logoImg) { logoImg.src=s.logo_url; logoImg.style.display='block'; }
  if(brandEl) {
    const tt = ST.lang==='ar'?(s.site_title_ar||'شاهد 365'):(s.site_title||'Shahid365');
    brandEl.innerHTML = esc(tt).replace('365','<span style="color:var(--a)">365</span>');
  }

  splashEl.style.display = 'flex';
  document.body.style.overflow = 'hidden';

  // Load video
  videoEl.src = s.splash_video_url;
  videoEl.muted = true;
  videoEl.play().catch(()=>{});

  // Progress bar animation
  progEl.style.width='0%';
  setTimeout(()=>{ progEl.style.transition=`width ${dur}s linear`; progEl.style.width='100%'; }, 50);

  // Show skip after 2s or duration-2s (whichever is smaller)
  const skipDelay = Math.min(2000, (dur-1)*1000);
  setTimeout(()=>{ skipBtn.style.display='flex'; }, Math.max(0, skipDelay));

  // Auto close
  const autoClose = setTimeout(()=>closeSplash(), dur*1000+200);
  videoEl.addEventListener('ended', ()=>{ clearTimeout(autoClose); closeSplash(); });
  ST._splashTimer = autoClose;
  sessionStorage.setItem('s365_splashed','1');
}

function closeSplash() {
  clearTimeout(ST._splashTimer);
  const splashEl=$('splash');
  if(!splashEl) return;
  splashEl.style.animation='splashFadeOut .5s forwards';
  const videoEl=$('splash-video');
  if(videoEl){videoEl.pause();videoEl.src='';}
  setTimeout(()=>{ splashEl.style.display='none'; document.body.style.overflow=''; },500);
}

const DB = {
  async getSettings() {
    try{
      const{data}=await sb.from('settings').select('*').eq('id',1).single();
      return data||{maintenance_on:false,sub_required:false,ads_enabled:true,site_title:'Shahid365',site_title_ar:'شاهد 365',trending_ids:[],downloads_enabled:true,logo_url:'',splash_enabled:false,splash_video_url:'',splash_duration:5};
    }catch{
      return {maintenance_on:false,sub_required:false,ads_enabled:true,site_title:'Shahid365',site_title_ar:'شاهد 365',trending_ids:[],downloads_enabled:true,logo_url:'',splash_enabled:false,splash_video_url:'',splash_duration:5};
    }
  },
  async getFeatured() {
    const{data}=await sb.from('movies').select('*').eq('featured',true).eq('active',true).order('created_at',{ascending:false}).limit(6);
    return data||[];
  },
  async getTrending() {
    const ids=ST.settings?.trending_ids||[];
    if(ids.length>0){
      const{data}=await sb.from('movies').select('*').in('id',ids).eq('active',true);
      if(data?.length>0) return ids.map(id=>data.find(m=>m.id===id)).filter(Boolean);
    }
    const{data}=await sb.from('movies').select('*').eq('active',true).order('views',{ascending:false}).limit(16);
    return data||[];
  },
  async getMovies(f={}) {
    let q=sb.from('movies').select('*').eq('active',true);
    if(f.type)    q=q.eq('type',f.type);
    if(f.q)       q=q.or(`title.ilike.%${f.q}%,title_ar.ilike.%${f.q}%,description_ar.ilike.%${f.q}%`);
    if(f.genre)   q=q.contains('genres',[f.genre]);
    if(f.year)    q=q.eq('year',+f.year);
    if(f.rating)  q=q.gte('rating',+f.rating);
    if(f.lang)    q=q.eq('language',f.lang);
    const sc={rating:'rating',views:'views',year:'year'}[f.sort]||'created_at';
    q=q.order(sc,{ascending:false,nullsLast:true}).limit(f.limit||48);
    const{data}=await q; return data||[];
  },
  async getMovie(id) {
    const{data,error}=await sb.from('movies').select('*').eq('id',id).single();
    if(error) throw error;
    sb.rpc('increment_views',{row_id:id}).then(null,()=>{});
    return data;
  },
  async getSeasons(movieId) {
    const{data}=await sb.from('seasons').select('*').eq('movie_id',movieId).order('season_number');
    return data||[];
  },
  async getEpisodes(sid) {
    const{data}=await sb.from('episodes').select('*').eq('season_id',sid).order('episode_number');
    return data||[];
  },
  async getTodayEps() {
    const today=new Date().toISOString().split('T')[0];
    const{data:eps}=await sb.from('episodes').select('*').eq('release_date',today).limit(12);
    if(!eps?.length) return [];
    const mids=[...new Set(eps.map(e=>e.movie_id))];
    const{data:mvs}=await sb.from('movies').select('id,title,title_ar,poster,type').in('id',mids);
    return eps.map(e=>({...e,movie:mvs?.find(m=>m.id===e.movie_id)}));
  },
  async getChannels(cat='') {
    let q=sb.from('channels').select('*').eq('active',true).order('sort_order').order('created_at',{ascending:false});
    if(cat&&cat!=='all') q=q.or(`category.eq.${cat},category_ar.eq.${cat}`);
    const{data}=await q; return data||[];
  },
  async getPerson(id) {
    const{data}=await sb.from('persons').select('*').eq('id',id).single(); return data;
  },
  async getAds() {
    const{data}=await sb.from('ads').select('*').eq('active',true); return data||[];
  },
  async trackAd(id,col) { sb.rpc('increment_ad_stat',{row_id:id,stat_col:col}).then(null,()=>{}); },
  async verifySub(code,fp,ua='') {
    const{data:sub,error}=await sb.from('subscriptions').select('*').eq('code',code.toUpperCase().trim()).single();
    if(error||!sub) return{ok:false,msg:'كود غير صحيح'};
    if(!sub.active) return{ok:false,msg:'الاشتراك غير نشط'};
    if(sub.expires_at&&new Date(sub.expires_at)<new Date()) return{ok:false,msg:'انتهت صلاحية الاشتراك'};
    const devs=sub.devices||[]; const ex=devs.find(d=>d.fp===fp);
    if(ex){
      await sb.from('subscriptions').update({devices:devs.map(d=>d.fp===fp?{...d,seen:new Date().toISOString(),ua}:d)}).eq('id',sub.id);
      return{ok:true};
    }
    if(devs.length>=sub.max_devices) return{ok:false,msg:`تجاوزت حد الأجهزة (${sub.max_devices})`};
    devs.push({fp,ua,reg:new Date().toISOString(),seen:new Date().toISOString()});
    await sb.from('subscriptions').update({devices:devs}).eq('id',sub.id);
    return{ok:true,registered:true};
  }
};

async function detectAdblock() {
  try {
    const t=document.createElement('div');
    t.innerHTML='&nbsp;'; t.className='adsbox pub_300x250 pub_728x90';
    t.style.cssText='width:1px;height:1px;position:absolute;left:-9999px;top:-9999px';
    document.body.appendChild(t);
    await new Promise(r=>setTimeout(r,120));
    const blocked=t.offsetHeight===0||window.getComputedStyle(t).display==='none';
    t.remove();
    if(blocked && ST.settings?.ads_enabled!==false) $('adblock-warn').style.display='flex';
  } catch {}
}
async function checkAdblock() {
  $('adblock-warn').style.display='none';
  await detectAdblock();
  if($('adblock-warn').style.display==='none') location.reload();
}

// ══════════════════════════════════════════════════════
//  ADS
// ══════════════════════════════════════════════════════
function canShowAd(ad) {
  if(ST.settings?.ads_enabled===false) return false;
  const f=ad.frequency||'once_per_session';
  const key=`s365_ad_${ad.id}`;
  if(f==='once_per_session'  && ST.adSeen[ad.id]) return false;
  if(f==='once_per_day'      && localStorage.getItem(key+'_day')===new Date().toDateString()) return false;
  return true;
}
function markAdShown(ad) {
  const f=ad.frequency||'once_per_session';
  if(f==='once_per_session') { ST.adSeen[ad.id]=true; localStorage.setItem('s365_ad_seen', JSON.stringify(ST.adSeen)); }
  if(f==='once_per_day')     localStorage.setItem(`s365_ad_${ad.id}_day`, new Date().toDateString());
  DB.trackAd(ad.id,'impressions');
}

function scheduleAd() {
  if(!ST.activeAds.length || ST.settings?.ads_enabled===false) return;
  const floats = ST.activeAds.filter(a=>a.placement==='floating'&&a.image_url&&canShowAd(a));
  if(!floats.length) return;
  const ad = floats[Math.floor(Math.random()*floats.length)];
  clearTimeout(ST._adTimer);
  ST._adTimer = setTimeout(()=>showFloatAd(ad), ad.delay_ms||3000);
}

function showFloatAd(ad) {
  document.querySelectorAll('.float-ad').forEach(e=>e.remove());
  markAdShown(ad);
  const dur=(ad.banner_secs||8)*1000;
  const div=document.createElement('div'); div.className='float-ad gl';
  div.innerHTML=`
    <div class="float-ad-close" id="fad-x">✕</div>
    <a href="${esc(ad.target_url||'#')}" target="_blank" rel="noreferrer" id="fad-lnk">
      <img class="float-ad-img" src="${esc(ad.image_url)}" alt="" onerror="this.closest('.float-ad')?.remove()"/>
    </a>
    <div class="float-ad-prog" id="fad-p" style="transition:width ${dur}ms linear;width:100%"></div>`;
  document.body.appendChild(div);
  requestAnimationFrame(()=>{ const p=div.querySelector('#fad-p'); if(p) p.style.width='0%'; });
  let ok=false; setTimeout(()=>ok=true,1800);
  div.querySelector('#fad-x')?.addEventListener('click',()=>{ if(ok) div.remove(); });
  div.querySelector('#fad-lnk')?.addEventListener('click',()=>DB.trackAd(ad.id,'clicks'));
  if(dur>0) setTimeout(()=>div.remove(), dur+500);
}

  ST._heroIdx=i;

async function buildSeasonsHTML(seasons, movieId) {
  let html='';
  for(const s of seasons) {
    const eps = await DB.getEpisodes(s.id);
    const stitle = ST.lang==='ar'?(s.title_ar||s.title):(s.title||s.title_ar)||`${t('season')} ${s.season_number}`;
    html+=`<div class="s-block">
      <div class="s-head" onclick="toggleSeason('sb-${s.id}','arr-${s.id}')">
        <span style="font-weight:700">${esc(stitle)}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:12px;color:var(--t3)">${eps.length} ${t('ep')}</span>
          <span id="arr-${s.id}" style="font-size:14px;transition:transform .25s">▼</span>
        </div>
      </div>
      <div class="s-body" id="sb-${s.id}">
        ${eps.map(ep=>{
          const epTitle=ST.lang==='ar'?(ep.title_ar||ep.title):(ep.title||ep.title_ar)||`${t('ep')} ${ep.episode_number}`;
          const isFuture = ep.release_date && new Date(ep.release_date)>new Date();
          return `
          <div class="ep-row" ${!isFuture&&ep.video_url?`onclick="openVP('${esc(ep.video_url)}','${esc(epTitle)}','${esc(ep.subtitle_url||'')}',true)"`:''}>
            <div class="ep-num">${ep.episode_number}</div>
            ${ep.thumbnail?`<img src="${esc(ep.thumbnail)}" style="width:80px;height:46px;border-radius:7px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.07)" loading="lazy" alt="">`:
            `<div style="width:80px;height:46px;border-radius:7px;background:rgba(255,255,255,.07);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px">▶</div>`}
            <div style="flex:1;overflow:hidden">
              <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(epTitle)}</div>
              ${ep.duration?`<div style="font-size:12px;color:var(--t3)">${ep.duration} دق</div>`:''}
            </div>
            ${isFuture?`<span class="badge bgo">${t('comingSoon')}</span>`:
            ep.video_url?`<button class="btn bp btn-sm">▶</button><button class="btn bs btn-sm" onclick="event.stopPropagation();openDlModal('${ep.id}','${esc(epTitle)}')">⬇</button>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }
  return html;
}

function toggleSeason(bodyId, arrId) {
  const b=$(bodyId), a=$(arrId);
  if(!b) return;
  const open=b.classList.toggle('open');

          ${ch.logo?`<img src="${esc(ch.logo)}" style="width:56px;height:56px;border-radius:12px;object-fit:contain;background:rgba(255,255,255,.08);padding:4px" loading="lazy" onerror="this.style.display='none'">`:
          `<span style="font-size:42px;line-height:1">📺</span>`}
          <div style="font-weight:700;font-size:13px">${esc(cname)}</div>
          ${ccat?`<span class="badge bb" style="font-size:10px">${esc(ccat)}</span>`:''}

            ${ch.active?`<span class="ld" style="width:5px;height:5px"></span><span style="color:var(--t2)">${t('available')}</span>`:
            `<span style="color:var(--t3)">${t('offline')}</span>`}

      }).join('')}

    <div style="height:40px"></div>
  </div>`;

}

function setLiveCh(id) {
  ST._liveCh=ST._liveChs.find(c=>c.id===id)||null;
  renderLiveView(ST._liveChs,[]);
}

function playLiveStream(ch) {
  const box=$('live-player-box'); if(!box) return;
  const url=ch.stream_url||'';
  const isYT=url.includes('youtube.com')||url.includes('youtu.be');
  if(isYT){
    const vid=url.includes('watch?v=')?url.split('watch?v=')[1].split('&')[0]:url.split('/').pop().split('?')[0];
    box.innerHTML=`<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1&rel=0" allow="autoplay;encrypted-media;fullscreen" allowfullscreen style="width:100%;height:100%;border:none;position:absolute;inset:0"></iframe>`;
    return;
  }
  const video=document.createElement('video');
  video.style.cssText='width:100%;height:100%;position:absolute;inset:0;background:#000';
  video.controls=true; video.autoplay=true; video.playsInline=true;
  box.innerHTML=''; box.appendChild(video);
  if(url.includes('.m3u8')&&typeof Hls!=='undefined'&&Hls.isSupported()){
    if(ST._hlsInst){ST._hlsInst.destroy();}
    const hls=new Hls(); ST._hlsInst=hls;
    hls.loadSource(url); hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));
  } else {
    video.src=url; video.play().catch(()=>{});
  }
}

async function doVerifySub() {
  const code = $('sub-inp')?.value?.trim();
  const btn=$('sub-btn'), err=$('sub-err');
  if(!code) return;
  btn.disabled=true; btn.textContent=t('verifying');
  err.style.display='none';
  try {
    const res = await DB.verifySub(code, ST.fp||'unknown', navigator.userAgent);
    if(res.ok) {
      localStorage.setItem('s365_sub', code);
      toast(t('subOk'),'success');
      go('home');
    } else {
      err.textContent=res.msg; err.style.display='block';
      btn.disabled=false; btn.textContent=t('activate');
    }
  } catch(e) {
    err.textContent=e.message; err.style.display='block';
    btn.disabled=false; btn.textContent=t('activate');
  }
}

let VP = {
  video: null, hlsInst: null,
  title: '', subUrl: '', adPlayed: false,
  statsInterval: null, subCues: [], subActive: false,
  locked: false, qualityLevels: [],
};

function openVP(url, title='', subUrl='', playAd=true, movieId='') {
  if(!url) return;
  const modal=$('vp-modal'), outer=$('vp-outer');
  // Find preroll ad
  const adToPlay = playAd && ST.settings?.ads_enabled!==false
    ? ST.activeAds.find(a=>['movie_player','series_player'].includes(a.placement)&&a.ad_format==='video'&&canShowAd(a))
    : null;
  VP.title=title||''; VP.subUrl=subUrl||''; VP.adPlayed=false;
  modal.classList.add('open');
  document.body.style.overflow='hidden';
  outer.innerHTML=buildPlayer(url, title, subUrl, adToPlay);
  const video=outer.querySelector('#vp-vid');
  VP.video=video;
  // HLS or direct
  initVPSource(url, video);
  // Load subtitles if VTT
  if(subUrl&&subUrl.endsWith('.vtt')) loadVTT(subUrl);
  // Play preroll ad
  if(adToPlay) playPrerollAd(adToPlay, url, title, subUrl);
  else setupVPControls(video);
}

function buildPlayer(url, title, subUrl, ad) {

function initVPSource(url, video) {
  if(!video) return;
  const isYT = url.includes('youtube.com')||url.includes('youtu.be');
  if(isYT) {
    const vid=url.includes('watch?v=')?url.split('watch?v=')[1].split('&')[0]:url.split('/').pop().split('?')[0];
    const outer=$('vp-outer');
    outer.innerHTML=`<div class="vp" id="vp-wrap">
      <iframe src="https://www.youtube.com/embed/${vid}?autoplay=1&rel=0&controls=1" allow="autoplay;encrypted-media;fullscreen" allowfullscreen
        style="width:100%;height:100%;border:none;position:absolute;inset:0;border-radius:12px"></iframe>
    </div>`;
    return;
  }
  if(url.includes('.m3u8') && typeof Hls!=='undefined' && Hls.isSupported()) {
    if(VP.hlsInst){VP.hlsInst.destroy();}
    const hls=new Hls({autoStartLoad:true,startLevel:-1});
    VP.hlsInst=hls; hls.loadSource(url); hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,(e,d)=>{
      video.play().catch(()=>{});
      // Build quality list
      VP.qualityLevels=d.levels||[];
      const list=$('vp-qual-list');
      if(list&&d.levels?.length>1){
        list.innerHTML=`<div class="vp-mi act" onclick="setQuality(-1)">تلقائي</div>`
          +d.levels.map((l,i)=>`<div class="vp-mi" onclick="setQuality(${i})">${l.height?l.height+'p':i}</div>`).join('');
      }
    });
    hls.on(Hls.Events.ERROR,(_,d)=>{ if(d.fatal) video.src=url; });
  } else {
    video.src=url; video.play().catch(()=>{});
  }
}

function setupVPControls(video) {
  if(!video) return;
  // Keyboard shortcuts
  const onKey=e=>{
    if(!$('vp-modal')?.classList.contains('open')) return;
    if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    if(e.key===' '||e.key==='k'){e.preventDefault();togglePlayPause();}
    else if(e.key==='ArrowRight')seekRel(10);
    else if(e.key==='ArrowLeft')seekRel(-10);
    else if(e.key==='ArrowUp'){e.preventDefault();video.volume=Math.min(1,video.volume+.1);}
    else if(e.key==='ArrowDown'){e.preventDefault();video.volume=Math.max(0,video.volume-.1);}
    else if(e.key==='f'||e.key==='F')toggleFS();
    else if(e.key==='m'||e.key==='M')toggleMute();
    else if(e.key==='Escape')closeVP();
  };
  document.addEventListener('keydown',onKey);
  VP._onKey=onKey;
  // Auto-hide controls
  let hideT;
  const vpWrap=$('vp-wrap');
  const ctrl=$('vp-ctrl');
  if(vpWrap&&ctrl){
    vpWrap.addEventListener('mousemove',()=>{ctrl.classList.add('show');clearTimeout(hideT);hideT=setTimeout(()=>{if(!video.paused)ctrl.classList.remove('show');},3000);});
    vpWrap.addEventListener('mouseleave',()=>{if(!video.paused){clearTimeout(hideT);ctrl.classList.remove('show');}});
  }
  video.addEventListener('play',()=>{ const btn=$('vp-pp');if(btn)btn.textContent='⏸'; });
  video.addEventListener('pause',()=>{ const btn=$('vp-pp');if(btn)btn.textContent='▶'; $('vp-ctrl')?.classList.add('show'); });
  // Volume sync
  const vol=$('vp-vol'); if(vol){vol.value=video.volume;video.addEventListener('volumechange',()=>{vol.value=video.volume;$('vp-mute-btn').textContent=video.muted||video.volume===0?'🔇':'🔊';});}
  // Stats interval
  clearInterval(VP.statsInterval);
  VP.statsInterval=setInterval(()=>updateStats(video),2000);
}

// VP Controls
function togglePlayPause(){
  const v=VP.video; if(!v) return;
  if(v.paused){v.play();flashIcon('▶');}else{v.pause();flashIcon('⏸');}
}
function flashIcon(ic){
  const f=$('vp-flash'),ico=$('vp-flash-ic'); if(!f||!ico)return;
  ico.textContent=ic; f.classList.add('show'); setTimeout(()=>f.classList.remove('show'),500);
}
function seekRel(s){ const v=VP.video; if(v) v.currentTime=Math.max(0,Math.min(v.duration||0,v.currentTime+s)); }
function setVol(v){ const vid=VP.video; if(vid){vid.volume=+v;vid.muted=+v===0;} }
function toggleMute(){ const v=VP.video; if(v){v.muted=!v.muted; const b=$('vp-mute-btn');if(b)b.textContent=v.muted?'🔇':'🔊';} }
function setSpeed(s){ const v=VP.video; if(v){v.playbackRate=s;} const l=$('vp-speed-lbl');if(l)l.textContent=s+'×'; document.querySelectorAll('#vp-speed-menu .vp-mi').forEach(el=>el.classList.toggle('active',parseFloat(el.textContent)===s)); }
function setQuality(idx){ if(VP.hlsInst){VP.hlsInst.currentLevel=idx;} document.querySelectorAll('#vp-qual-list .vp-mi').forEach((el,i)=>el.classList.toggle('act',idx===-1?i===0:i===idx+1)); }
function toggleFS(){
  const w=$('vp-wrap');if(!w)return;
  if(document.fullscreenElement){document.exitFullscreen?.();}
  else{w.requestFullscreen?.();}
  const b=$('vp-fs-btn');if(b)b.textContent=document.fullscreenElement?'⛶':'⛶';
}
async function togglePiP(){ const v=VP.video; if(!v) return; try{ if(document.pictureInPictureElement)await document.exitPictureInPicture(); else await v.requestPictureInPicture(); }catch{} }
function toggleScreenLock(){
  ST._vpLocked=!ST._vpLocked;
  const lock=$('vp-lock'),btn=$('vp-lock-btn');
  lock?.classList.toggle('show',ST._vpLocked);
  if(btn) btn.textContent=ST._vpLocked?'🔒':'🔓';
  toast(ST._vpLocked?'تم قفل الشاشة':'تم رفع القفل');
}
function toggleStats(){
  const s=$('vp-stats');if(s)s.classList.toggle('show');
  updateStats(VP.video);
}
function toggleSub(active){
  VP.subActive=active;
  const t=$('vp-sub-text');if(t)t.style.display=active?'inline-block':'none';
  document.querySelectorAll('#vp-sub-menu .vp-mi').forEach((el,i)=>el.classList.toggle('act',(active&&i===0)||(!active&&i===1)));
}
function toggleMenu(id){ const m=$(id);if(m){document.querySelectorAll('.vp-menu').forEach(x=>x!==m&&x.classList.remove('show'));m.classList.toggle('show');} }
document.addEventListener('click',e=>{ if(!e.target.closest('.vp-menu-wrap')) document.querySelectorAll('.vp-menu').forEach(m=>m.classList.remove('show')); });

function onVPProgress(){
  const v=VP.video;if(!v||!v.duration)return;
  const pct=(v.currentTime/v.duration)*100;
  const f=$('vp-fill'),h=$('vp-handle'),ti=$('vp-time');
  if(f)f.style.width=pct+'%';
  if(h)h.style.left=pct+'%';
  if(ti)ti.textContent=s2t(v.currentTime)+' / '+s2t(v.duration);
  // Buffer
  if(v.buffered.length){const b=$('vp-buf');if(b)b.style.width=(v.buffered.end(v.buffered.length-1)/v.duration*100)+'%';}
  // Subtitle
  if(VP.subActive&&VP.subCues.length){
    const now=v.currentTime;
    const cue=VP.subCues.find(c=>now>=c.start&&now<=c.end);
    const st=$('vp-sub-text');
    if(st){st.textContent=cue?cue.text:'';st.style.display=cue?'inline-block':'none';}
  }
}

function onVPMeta(){ const v=VP.video;if(v){setupVPControls(v);} }
function showSpinner(show){ const s=$('vp-spinner');if(s)s.style.display=show?'flex':'none'; }
function vpError(){ toast('فشل تحميل الفيديو','error'); }
function seekByClick(e){ const v=VP.video;if(!v||!v.duration)return;const r=e.currentTarget.getBoundingClientRect();const pct=(e.clientX-r.left)/r.width;v.currentTime=pct*v.duration; }
function showProgTime(e){ /* hover preview placeholder */ }

function updateStats(v){
  const s=$('vp-stats');if(!s||!s.classList.contains('show')||!v)return;
  const hls=VP.hlsInst;
  const qual=hls&&hls.currentLevel>=0?`${hls.levels?.[hls.currentLevel]?.height||'—'}p`:'Auto';
  s.innerHTML=`<b>Shahid365 Player</b><br>
    Quality: ${qual}<br>
    Time: ${s2t(v.currentTime)} / ${s2t(v.duration||0)}<br>
    Speed: ${v.playbackRate}x<br>
    Buffer: ${v.buffered.length?s2t(v.buffered.end(v.buffered.length-1)-v.currentTime):'0'}s<br>
    Volume: ${Math.round(v.volume*100)}%`;
}

// VTT subtitle loader
async function loadVTT(url){
  try{
    const r=await fetch(url);const txt=await r.text();
    VP.subCues=[];
    const blocks=txt.trim().split(/\n\n+/);
    for(const b of blocks){
      const lines=b.trim().split('\n');
      const timeLine=lines.find(l=>l.includes('-->'));
      if(!timeLine)continue;
      const [s,e]=timeLine.split('-->').map(x=>x.trim().split(':').reduce((acc,v,i,arr)=>acc+(i===arr.length-1?parseFloat(v):parseFloat(v)*(i===arr.length-2?60:3600)),0));
      const text=lines.slice(lines.indexOf(timeLine)+1).join('\n').replace(/<[^>]+>/g,'');
      if(s!==undefined&&e!==undefined&&text)VP.subCues.push({start:s,end:e,text});
    }
    VP.subActive=true;
  }catch{}
}

// Preroll ad
function playPrerollAd(ad, mainUrl, title, subUrl){
  const wrap=$('vp-wrap');if(!wrap)return;
  markAdShown(ad);
  const adVid=document.createElement('video');
  adVid.src=ad.video_url||'';
  adVid.autoplay=true; adVid.playsInline=true; adVid.muted=!!ad.force_mute;
  adVid.style.cssText='width:100%;height:100%;position:absolute;inset:0;z-index:20;background:#000';
  wrap.appendChild(adVid);
  DB.trackAd(ad.id,'impressions');
  // Skip btn
  const skipAfter=ad.skip_after_seconds??5;
  let skippable=skipAfter===0;
  const skipEl=document.createElement('button');
  skipEl.className='vp-ad-skip-btn';
  skipEl.style.display='none';
  const countdown=ad.show_countdown&&!skippable?`<span class="vp-ad-counter" id="ad-cnt">${skipAfter}</span>`:'';
  skipEl.innerHTML=`${countdown}<span>${t('skipAd')}</span>`;
  wrap.appendChild(skipEl);
  if(skipAfter>0){
    let rem=skipAfter;
    const cntInterval=setInterval(()=>{
      rem--;
      const cc=$('ad-cnt'); if(cc)cc.textContent=rem;
      if(rem<=0){clearInterval(cntInterval);skipEl.style.display='flex';skipEl.querySelector('span:last-child').textContent=t('skipAd');}
    },1000);
    setTimeout(()=>skipEl.style.display='flex',skipAfter*1000);
  } else {
    skipEl.style.display='flex';
  }
  const doSkip=()=>{
    adVid.pause();adVid.remove();skipEl.remove();
    const mainVideo=$('vp-vid');
    if(mainVideo)initVPSource(mainUrl,mainVideo);
    setupVPControls(mainVideo);
  };
  skipEl.addEventListener('click',doSkip);
  adVid.addEventListener('ended',doSkip);
  adVid.addEventListener('click',()=>window.open(ad.target_url||'#','_blank'));
}

function closeVP(){
  $('vp-modal')?.classList.remove('open');
  document.body.style.overflow='';
  if(VP.hlsInst){VP.hlsInst.destroy();VP.hlsInst=null;}
  clearInterval(VP.statsInterval);
  if(VP._onKey) document.removeEventListener('keydown',VP._onKey);
  const v=VP.video;if(v){v.pause();v.src='';}
  VP.video=null; ST._vpLocked=false;
  $('vp-outer').innerHTML='';
  document.exitFullscreen?.().catch(()=>{});
}
